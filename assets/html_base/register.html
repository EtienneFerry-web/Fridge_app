<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Register | The Culinary Curator</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="styles.css" rel="stylesheet">
</head>
<body class="bg-surface font-body text-on-surface">

    <div class="container-fluid p-0 min-vh-100 overflow-hidden">
        <div class="row g-0 min-vh-100">

            <!-- Mobile Simple Header -->
            <header class="d-md-none col-12 w-100 p-4 sticky-top bg-surface d-flex align-items-center justify-content-center border-bottom border-light z-3">
                <span class="material-symbols-outlined text-primary-custom fs-4 me-2">eco</span>
                <span class="font-headline fw-bold fs-5 text-primary-custom">The Organic Curator</span>
            </header>

            <!-- Left Side: Visual Anchor (Hidden on Mobile) -->
            <!-- Adjusted column widths slightly so form side has enough space -->
            <div class="col-md-5 col-lg-6 d-none d-md-block position-relative overflow-hidden min-vh-100 bg-dark">
                <img src="https://lh3.googleusercontent.com/aida-public/AB6AXuBWUWl0XaLDXc6G9wlVUAySVxy_m-veRo39i4MOvFCQSyZK3LfodPb9yT8nN9KzZzdoV8qs4T412Yzx3KwYK1SXe6dYTx10JdPbKbVvO1kMDK8sRlJ8zLgSuJMGLdlR09iqpTYREPkPXs5eeooTyio50Aiz7YJNwrneKjrje-1lguAfcyd7RgFt2lbjyNwWYM2MqV-exQT4GX7m7FCnMS_omHhAhkp0xcGowTLlNHrsFA2lOXZAeZSPSgF23C0_H-JaV3OYNsdmwXU" alt="Kitchen" class="w-100 h-100 object-fit-cover opacity-75 position-absolute top-0 start-0">
                <div class="position-absolute top-0 bottom-0 start-0 end-0 bg-primary-custom opacity-25" style="mix-blend-mode: multiply;"></div>
                <!-- Overlay Content -->
                <div class="position-absolute bottom-0 start-0 p-5 text-white bg-gradient w-100">
                    <h1 class="font-headline fw-bolder display-4 mb-3">The Culinary Curator</h1>
                    <p class="font-body fs-5 opacity-75" style="max-width: 450px;">Join our living larder. Discover the art of mindful kitchen management.</p>
                </div>
            </div>

            <!-- Right Side: Interaction Zone -->
            <div class="col-12 col-md-7 col-lg-6 d-flex flex-column align-items-center px-4 py-5 px-md-5 bg-surface-lowest min-vh-100 position-relative z-1" style="overflow-y: auto;">
                <div class="my-auto w-100" style="max-width: 450px;">
                
                <header class="mb-4 text-center text-md-start mt-2 mt-md-0">
                    <h2 class="font-headline fw-bolder display-6 text-dark mb-2">Create Account.</h2>
                    <p class="text-on-surface-variant font-body">Start your culinary journey today.</p>
                </header>

                <form>
                    <div class="row g-2 mb-3">
                        <div class="col-sm-6">
                            <label for="firstname" class="form-label fw-semibold text-on-surface-variant small ms-1">First Name (Prénom)</label>
                            <input type="text" class="form-control form-control-lg bg-light border-0 px-3 py-3 shadow-none focus-ring focus-ring-success font-body text-sm" id="firstname" placeholder="Jane" required>
                        </div>
                        <div class="col-sm-6 mt-3 mt-sm-0">
                            <label for="lastname" class="form-label fw-semibold text-on-surface-variant small ms-1">Last Name (Nom)</label>
                            <input type="text" class="form-control form-control-lg bg-light border-0 px-3 py-3 shadow-none focus-ring focus-ring-success font-body text-sm" id="lastname" placeholder="Doe" required>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label for="email" class="form-label fw-semibold text-on-surface-variant small ms-1">Email Address</label>
                        <input type="email" class="form-control form-control-lg bg-light border-0 px-3 py-3 shadow-none focus-ring focus-ring-success font-body text-sm" id="email" placeholder="name@example.com" required>
                    </div>

                    <div class="row g-2 mb-3">
                        <div class="col-sm-6">
                            <label for="age" class="form-label fw-semibold text-on-surface-variant small ms-1">Age</label>
                            <input type="number" class="form-control form-control-lg bg-light border-0 px-3 py-3 shadow-none focus-ring focus-ring-success font-body text-sm" id="age" placeholder="25" min="1" max="120" required>
                        </div>
                        <div class="col-sm-6 mt-3 mt-sm-0">
                            <label for="dietary" class="form-label fw-semibold text-on-surface-variant small ms-1">Dietary Regime</label>
                            <select class="form-select form-control-lg bg-light border-0 px-3 py-3 shadow-none focus-ring focus-ring-success font-body text-sm" id="dietary" required>
                                <option value="" selected disabled>Select...</option>
                                <option value="none">None</option>
                                <option value="vegetarian">Vegetarian</option>
                                <option value="vegan">Vegan</option>
                                <option value="pescatarian">Pescatarian</option>
                                <option value="gluten-free">Gluten-Free</option>
                                <option value="keto">Keto</option>
                                <option value="paleo">Paleo</option>
                            </select>
                        </div>
                    </div>

                    <div class="row g-2 mb-4">
                        <div class="col-sm-6">
                            <label for="password" class="form-label fw-semibold text-on-surface-variant small ms-1">Password</label>
                            <input type="password" class="form-control form-control-lg bg-light border-0 px-3 py-3 shadow-none focus-ring focus-ring-success font-body text-sm" id="password" placeholder="••••••••" required>
                        </div>
                        <div class="col-sm-6 mt-3 mt-sm-0">
                            <label for="confirm_password" class="form-label fw-semibold text-on-surface-variant small ms-1">Confirm Password</label>
                            <input type="password" class="form-control form-control-lg bg-light border-0 px-3 py-3 shadow-none focus-ring focus-ring-success font-body text-sm" id="confirm_password" placeholder="••••••••" required>
                        </div>
                    </div>

                    <button type="submit" class="btn bg-primary-custom text-white w-100 py-3 rounded-pill fw-bold font-headline fs-6 mt-1 mb-4 d-flex align-items-center justify-content-center gap-2 primary-gradient-hover shadow-sm">
                        Sign Up
                    </button>
                </form>

                <div class="d-flex align-items-center my-3">
                    <hr class="flex-grow-1 border-secondary opacity-25">
                    <span class="mx-3 small text-muted text-uppercase fw-semibold" style="letter-spacing: 1px;">Or</span>
                    <hr class="flex-grow-1 border-secondary opacity-25">
                </div>

                <div class="row g-3 px-0">
                    <div class="col-12 col-xl-6">
                        <button class="btn btn-light w-100 py-3 fw-semibold text-muted d-flex align-items-center justify-content-center gap-2 rounded-3">
                            <svg class="w-5 h-5" style="width:20px; height:20px;" viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="currentColor"></path><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"></path><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"></path><path d="M12 5.38c1.62 0 3.06.56 4.21 1.66l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"></path></svg>
                            Google
                        </button>
                    </div>
                    <div class="col-12 col-xl-6">
                        <button class="btn btn-light w-100 py-3 fw-semibold text-muted d-flex align-items-center justify-content-center gap-2 rounded-3">
                            <svg class="w-5 h-5" style="width:20px; height:20px;" viewBox="0 0 24 24"><path d="M17.05 20.28c-.98.95-2.05.88-3.08.4c-1.09-.5-2.08-.48-3.24 0-1.44.62-2.2.44-3.06-.4C4.38 17.07 3.5 11.23 5.4 8.08c.95-1.57 2.56-2.54 4.08-2.5 1.16.03 2.03.58 2.85.58s1.95-.73 3.43-.57c1.55.17 2.7 1.13 3.4 2.15-3.2 1.92-2.7 6.13.5 7.42-.65 1.6-1.5 3.1-2.6 4.12zM12.03 5.3c-.22-2.3 1.76-4.3 3.96-4.3.26 2.54-2.2 4.63-3.96 4.3z" fill="currentColor"></path></svg>
                            Apple
                        </button>
                    </div>
                </div>

                <div class="text-center mt-4 mb-3">
                    <p class="text-muted small">Already have an account? <a href="login.html" class="text-primary-custom fw-bold text-decoration-none border-bottom border-success border-2 pb-1 ms-1">Sign In</a></p>
                </div>
            </div>

            <!-- Asymmetric Graphic Component (Desktop Only) -->
            <aside class="d-none d-xl-block mt-auto align-self-start p-4 rounded-4 bg-surface-low border border-light" style="max-width: 250px;">
                <span class="material-symbols-outlined text-primary-custom fs-2 mb-2">eco</span>
                <p class="font-headline fst-italic text-muted lh-base mb-2" style="font-size: 14px;">"The Earth is what we all have in common."</p>
                <p class="text-uppercase fw-bold text-black-50 m-0" style="font-size: 10px; letter-spacing: 2px;">— Wendell Berry</p>
            </aside>
        </div>

    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
